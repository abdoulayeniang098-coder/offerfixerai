<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Offer Fixer AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#000;--white:#fff;--gray-800:#111;--gray-700:#1a1a1a;--gray-400:#555;--gray-300:#888;--violet:#8A2BE2;--blue:#00BFFF;--grad:linear-gradient(135deg,#8A2BE2,#00BFFF);--grad-text:linear-gradient(90deg,#8A2BE2,#00BFFF);--glow:0 0 30px rgba(138,43,226,0.4),0 0 60px rgba(0,191,255,0.15);--glow-sm:0 0 15px rgba(138,43,226,0.3);--radius:16px;--radius-sm:10px}
body{background:var(--black);color:var(--white);font-family:"Inter",sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(138,43,226,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(138,43,226,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
body::after{content:"";position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(138,43,226,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);background:rgba(0,0,0,0.6)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-sm)}
.logo-text{font-family:"Syne",sans-serif;font-weight:700;font-size:17px;background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem}
.err-code{font-family:"Syne",sans-serif;font-size:clamp(6rem,20vw,11rem);font-weight:800;line-height:1;background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:fadeUp 0.6s ease 0.1s forwards}
.err-title{font-family:"Syne",sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;margin:1rem 0 0.75rem;opacity:0;animation:fadeUp 0.6s ease 0.2s forwards}
.err-sub{font-size:15px;color:var(--gray-300);max-width:440px;line-height:1.7;margin-bottom:2.5rem;opacity:0;animation:fadeUp 0.6s ease 0.3s forwards}
.err-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp 0.6s ease 0.4s forwards}
.btn-home{padding:12px 26px;background:var(--grad);color:#fff;font-family:"Syne",sans-serif;font-size:14px;font-weight:700;letter-spacing:0.04em;border:none;border-radius:var(--radius-sm);cursor:pointer;box-shadow:var(--glow);text-decoration:none;transition:transform 0.15s}
.btn-home:hover{transform:translateY(-2px)}
.btn-ghost{padding:11px 22px;background:transparent;color:var(--gray-300);font-family:"Syne",sans-serif;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);cursor:pointer;text-decoration:none;transition:border-color 0.2s,color 0.2s}
.btn-ghost:hover{border-color:rgba(255,255,255,0.35);color:var(--white)}
.floating-card{margin-top:3.5rem;background:var(--gray-800);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:1.5rem 2rem;max-width:420px;width:100%;opacity:0;animation:fadeUp 0.6s ease 0.5s forwards}
.floating-card p{font-size:13px;color:var(--gray-400);margin-bottom:1rem}
.quick-links{display:flex;flex-direction:column;gap:8px}
.quick-link{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--gray-700);border-radius:var(--radius-sm);text-decoration:none;color:var(--gray-200);font-size:13px;transition:background 0.2s}
.quick-link:hover{background:#222;color:var(--white)}
.quick-link span{color:var(--violet);font-size:16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){header{padding:1rem 1.25rem}.err-code{font-size:6rem}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="1" y="11" width="3.5" height="7" rx="1" fill="rgba(255,255,255,0.6)"/>
        <rect x="6" y="7" width="3.5" height="11" rx="1" fill="rgba(255,255,255,0.8)"/>
        <rect x="11" y="4" width="3.5" height="14" rx="1" fill="white"/>
        <path d="M16.5 1L17.3 3.2L19.5 4L17.3 4.8L16.5 7L15.7 4.8L13.5 4L15.7 3.2Z" fill="white" opacity="0.95"/>
      </svg>
    </div>
    <span class="logo-text">Offer Fixer AI</span>
  </a>
</header>
<main>
  <div class="err-code">404</div>
  <h1 class="err-title">This page doesn't exist — your offer should.</h1>
  <p class="err-sub">Looks like you wandered off. Don't worry, your next winning offer is just one click away.</p>
  <div class="err-btns">
    <a href="index.html" class="btn-home">&#x26A1; Analyze My Offer</a>
    <a href="index.html" class="btn-ghost">Back to home</a>
  </div>
  <div class="floating-card">
    <p>While you're here, quick links:</p>
    <div class="quick-links">
      <a href="index.html" class="quick-link">Offer Analyzer <span>&#8594;</span></a>
      <a href="privacy.html" class="quick-link">Privacy Policy <span>&#8594;</span></a>
      <a href="index.html#pricing" class="quick-link">Pricing <span>&#8594;</span></a>
    </div>
  </div>
</main>
</body>
</html>
